name: Feature Request
description: Suggest a feature for LibertyMind
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: layer
    attributes:
      label: Target Layer
      description: Which architecture layer should this feature belong to?
      options:
        - Core (PyTorch)
        - Integration (Pure Python)
        - v4.2 Extensions
        - CLI
        - Server
        - Documentation
